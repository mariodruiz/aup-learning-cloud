# AUP Learning Cloud - Deployment Configuration
#
# Deploy with:
#   helm install jupyterhub ./chart -n jupyterhub --create-namespace -f values.yaml
#
# This file contains environment-specific overrides.
# See chart/values.yaml for all available options and defaults.
#
# ============================================================================
# Course Management Guide
# ============================================================================
# Add a new course:
#   1. Add course image in custom.resources.images
#   2. Add resource requirements in custom.resources.requirements
#   3. Add team access permissions in custom.teams.mapping
#
# Modify a course:
#   - Change image address or tag in images
#   - Adjust CPU/memory/GPU settings in requirements
#
# Add a new accelerator:
#   - Add a new accelerator entry in custom.accelerators
# ============================================================================

custom:
  # Authentication mode
  # - auto-login: No credentials required, auto-login as 'student' (for single-node dev)
  # - dummy: Accept any username/password (for testing)
  # - github: GitHub OAuth authentication
  # - multi: GitHub OAuth + Local accounts
  authMode: "auto-login"

  # Auto-create admin user on first install
  adminUser:
    enabled: false

  # ============================================================================
  # Notifications
  # ============================================================================
  # Helm value changes require `helm upgrade` and a Hub restart or rollout before
  # users see updated notices.
  # Notice id and version identify configured notices only; they do not control
  # backend dismissal state. Collapsed or expanded topbar state is client-only
  # and is not persisted.
  # Markdown and HTML are sanitized by the Hub backend before rendering. Only a
  # small backend allowlist of tags, attributes, and URL schemes is rendered.
  notifications:
    enabled: true
    topbar:
      # Disabled by default so the standard install renders no urgent topbar notice.
      # Set enabled=true and fill id/title/message to show a stateless, collapsible banner.
      enabled: false
      id: ""
      version: "1"
      severity: warning
      dismissible: true
      title: ""
      message: ""
      format: markdown
      link:
        label: ""
        url: ""
      # Optional ISO-8601 strings; invalid time windows are handled by backend validation.
      startsAt: ""
      endsAt: ""
    homepage:
      enabled: true
      # When no structured homepage items are active, fall back to the legacy
      # hub.extraFiles.announcement.txt content mounted as static/announcement.txt.
      legacyAnnouncementFallback: true
      items:
        - id: platform-welcome
          version: "1"
          severity: info
          eyebrow: "Platform"
          title: "Welcome to AUP Learning Cloud"
          message: "Get started with GPU-accelerated Jupyter notebooks powered by AMD ROCm technology."
          format: markdown
          startsAt: ""
          endsAt: ""
          link:
            label: ""
            url: ""
  # ============================================================================
  # Allowed Origins
  # ============================================================================
  # hub.allowedOrigins      — sets Access-Control-Allow-Origin on Hub HTTP responses
  # notebook.allowedOrigins — injected into each notebook server's startup args
  #                           (--ServerApp.allow_origin_pat); handles kernel WebSocket
  #
  # Use ["*"] to allow all, or list specific domains.
  # Example: ["https://mylab.example.com", "https://alt.example.org"]
  hub:
    allowedOrigins: ["*"]
  notebook:
    allowedOrigins: ["*"]

  # ============================================================================
  # Public Scheme (TLS termination outside the chart)
  # ============================================================================
  # When TLS is terminated by an external component (Cloudflare tunnel,
  # external ingress / HTTPS load balancer) instead of the chart's autohttps
  # (proxy.https.enabled=true), set publicScheme="https" so the Hub marks the
  # _xsrf cookie Secure. Leave unset (or "http") for the default single-node
  # HTTP install — browsers reject Secure cookies received over HTTP and
  # POST /hub/spawn would 403 (see AUPPM-64).
  # security:
  #   publicScheme: "https"

  # ============================================================================
  # Git Repository Cloning
  # ============================================================================
  # Users can provide an optional Git URL on the spawn form; the repo will be
  # cloned into ~/home at container start via an init container.
  #
  # Private repo access — two independent mechanisms (can be used together):
  #
  #   1. GitHub App (githubAppName)
  #      For GitHub OAuth users. Users authorize per-repo read-only access via
  #      the GitHub App UI. Token is obtained automatically from OAuth session.
  #      Requires migrating from OAuth App to GitHub App — see below.
  #
  #   2. Default Access Token (defaultAccessToken)
  #      A bot/service-account PAT configured by the admin. Applied transparently
  #      to all users (including auto-login). Useful for single-node / classroom
  #      setups where everyone needs access to the same private repos without
  #      any GitHub login.
  #
  # Token priority: OAuth token (GitHub App) > defaultAccessToken > none (public only)
  #
  # Migrating from OAuth App to GitHub App:
  #   1. Create a GitHub App (org settings → Developer settings → GitHub Apps)
  #      - Callback URL: same as current oauth_callback_url
  #      - Permissions: Contents (read-only), Metadata (read-only), Members (read-only)
  #      - Webhook: off
  #   2. Update hub.config.GitHubOAuthenticator:
  #        app_id: "<GitHub App App ID>"
  #        installation_id: "<GitHub App Installation ID>"
  #        private_key_file: "<Mounted GitHub App private key path>"
  #        client_id: "<GitHub App Client ID>"
  #        client_secret: "<GitHub App Client Secret>"
  #        scope: []  # GitHub App does not use OAuth scopes
  #   3. Set githubAppName below to the App slug
  #   4. helm upgrade — existing user sessions continue, new logins use GitHub App
  #
  gitClone:
    # -- Private Repo Access --
    # GitHub App slug (e.g. "aup-learning-cloud")
    # Enables repo picker UI and automatic OAuth token usage for private repos.
    # Only effective for GitHub OAuth users; auto-login/native users are unaffected.
    githubAppName: ""
    # Default access token for private repos (e.g. a bot/service account PAT).
    # Works for ALL auth modes including auto-login — users don't need to know
    # the token exists. Helm auto-creates a K8s Secret from this value.
    # Scope the PAT to read-only on specific repos to limit blast radius.
    defaultAccessToken: ""
    # -- Clone Behavior --
    # Allowed Git hosting providers (subdomains are also accepted)
    allowedProviders:
      - github.com
      - gitlab.com
      - bitbucket.org
    # Maximum time (seconds) allowed for a clone or fetch operation
    maxCloneTimeout: 300
    # Container image used for git operations (must include git and sh)
    initContainerImage: "alpine/git:2.47.2"

  # ============================================================================
  # Accelerator Configuration
  # ============================================================================
  # Define available accelerator entries for the course selection interface.
  # Each accelerator uses Kubernetes node selectors such as
  # amd.com/gpu.product-name to target compatible nodes.
  accelerators:
    phx:
      displayName: "AMD Radeon™ 780M (Phoenix Point iGPU)"
      description: "RDNA 3.0 (gfx1103) | Compute Units 12 | 4GB LPDDR5X"
      nodeSelector:
        amd.com/gpu.product-name: "AMD_Radeon_780M_Graphics"
      env:
        # Phoenix hw (gfx1100/1101/1102/1103) shares a single gfx110x ROCm
        # build — we do not ship dedicated images for gfx1102/gfx1103 — so
        # force every Phoenix GPU to report as gfx1100 at runtime so it
        # accepts the shared kernels.
        HSA_OVERRIDE_GFX_VERSION: "11.0.0"
      quotaRate: 2
    strix:
      displayName: "AMD Radeon™ 890M (Strix Point iGPU)"
      description: "RDNA 3.5 (gfx1150) | Compute Units 16 | 4GB LPDDR5X"
      nodeSelector:
        amd.com/gpu.product-name: "AMD_Radeon_890M_Graphics"
      env: {}
      quotaRate: 2
    strix-halo:
      displayName: "AMD Radeon™ 8060S (Strix Halo iGPU)"
      description: "RDNA 3.5 (gfx1151) | Compute Units 40 | 64GB LPDDR5X"
      nodeSelector:
        amd.com/gpu.product-name: "AMD_Radeon_8060S_Graphics"
      env: {}
      quotaRate: 3
    9070xt:
      displayName: "AMD Radeon™ RX 9070 XT (Desktop GPU)"
      description: "RDNA 4.0 (gfx1201) | Compute Units 64 | 16GB GDDR6"
      # ROCm labeller publishes the marketing name with spaces → '_', so the
      # expected value on a real node is AMD_Radeon_RX_9070_XT. If your fleet
      # uses the older AMD_Radeon_9070XT normalisation, change it here.
      nodeSelector:
        amd.com/gpu.product-name: "AMD_Radeon_RX_9070_XT"
      env: {}
      quotaRate: 4
    r9700:
      displayName: "AMD Radeon™ AI Pro R9700 (Workstation GPU)"
      description: "RDNA 4.0 (gfx1201) | Compute Units 64 | 32GB GDDR6"
      nodeSelector:
        amd.com/gpu.product-name: "AMD_Radeon_AI_PRO_R9700"
      env: {}
      quotaRate: 4

  # ============================================================================
  # Course Resources Configuration
  # ============================================================================
  resources:
    # Course Images
    # Add new course images here
    images:
      cpu: "ghcr.io/amdresearch/auplc-default:latest"
      gpu: "ghcr.io/amdresearch/auplc-base:latest"
      code-cpu: "ghcr.io/amdresearch/auplc-code-cpu:latest"
      code-gpu: "ghcr.io/amdresearch/auplc-code-gpu:latest"
      Course-CV: "ghcr.io/amdresearch/auplc-cv:latest"
      Course-DL: "ghcr.io/amdresearch/auplc-dl:latest"
      Course-LLM: "ghcr.io/amdresearch/auplc-llm:latest"
      Course-PhySim: "ghcr.io/amdresearch/auplc-physim:latest"
      # Custom-URL: "ghcr.io/amdresearch/auplc-cv:latest"

    # Course Resource Requirements
    # Define resource quotas for each course
    requirements:
      cpu:
        cpu: "0"
        memory: "0Gi"
      code-cpu:
        cpu: "0"
        memory: "0Gi"
      gpu:
        cpu: "0"
        memory: "0Gi"
        amd.com/gpu: "1"
      code-gpu:
        cpu: "0"
        memory: "0Gi"
        amd.com/gpu: "1"
      Course-CV:
        cpu: "0"
        memory: "0Gi"
        amd.com/gpu: "1"
      Course-DL:
        cpu: "0"
        memory: "0Gi"
        amd.com/gpu: "1"
      Course-LLM:
        cpu: "0"
        memory: "0Gi"
        amd.com/gpu: "1"
      Course-PhySim:
        cpu: "0"
        memory: "0Gi"
        amd.com/gpu: "1"
      none:
        cpu: "0"
        memory: "0Gi"

    # Course Metadata (for spawn UI)
    # Defines display information for each course
    metadata:
      cpu:
        group: "CUSTOM REPO"
        description: "Basic Python Environment"
        subDescription: "CPU Only Environment"
        accelerator: ""
        acceleratorKeys: []
        allowGitClone: true
        resourceType: "notebook"
      code-cpu:
        group: "DEVELOPMENT"
        description: "Code Server CPU Environment"
        subDescription: "CPU-only development workspace"
        accelerator: ""
        acceleratorKeys: []
        allowGitClone: true
        launchMode: "code-server"
        resourceType: "browser-ide"
      gpu:
        group: "CUSTOM REPO"
        description: "Basic GPU Environment"
        subDescription: "GPU Accelerated Environment"
        accelerator: "GPU"
        acceleratorKeys:
          - strix-halo
        allowGitClone: true
        resourceType: "notebook"
      code-gpu:
        group: "DEVELOPMENT"
        description: "Code Server GPU Environment"
        subDescription: "GPU-accelerated development workspace"
        accelerator: "GPU"
        acceleratorKeys:
          - strix-halo
        allowGitClone: true
        launchMode: "code-server"
        resourceType: "browser-ide"
      Course-CV:
        group: "COURSE"
        description: "Computer Vision Course"
        subDescription: "Suitable for CV experiments with GPU"
        accelerator: "GPU"
        acceleratorKeys:
          - strix-halo
        # acceleratorOverrides: (optional) per-accelerator image and env overrides
        #   9070xt:
        #     image: "ghcr.io/your-org/auplc-cv:<tag-for-9070xt>"
        #   r9700:
        #     image: "ghcr.io/your-org/auplc-cv:<tag-for-r9700>"
        resourceType: "notebook"
      Course-DL:
        group: "COURSE"
        description: "Deep Learning Course"
        subDescription: "Suitable for DL experiments with GPU"
        accelerator: "GPU"
        acceleratorKeys:
          - strix-halo
        resourceType: "notebook"
      Course-LLM:
        group: "COURSE"
        description: "Large Language Models Course"
        subDescription: "Suitable for LLM experiments with GPU"
        accelerator: "GPU"
        acceleratorKeys:
          - strix-halo
        resourceType: "notebook"
      Course-PhySim:
        group: "COURSE"
        description: "Genesis Physical Simulation Course"
        subDescription: "Suitable for physical simulation experiments with GPU"
        accelerator: "GPU"
        acceleratorKeys:
          - strix-halo
        resourceType: "notebook"

  # ============================================================================
  # Team Permission Configuration
  # ============================================================================
  # Define which teams can access which courses
  teams:
    mapping:
      cpu:
        - cpu
        - code-cpu
      gpu:
        - code-gpu
        - Course-CV
        - Course-DL
        - Course-LLM
        - Course-PhySim
      official:
        - cpu
        - gpu
        - code-cpu
        - code-gpu
        - Course-CV
        - Course-DL
        - Course-LLM
        - Course-PhySim
      AUP:
        - Course-CV
        - Course-DL
        - Course-LLM
        - Course-PhySim
      native-users:
        - code-cpu
        - code-gpu
        - Course-CV
        - Course-DL
        - Course-LLM
        - Course-PhySim
        - cpu
        - gpu
      github-users:
        - cpu
        - gpu
        - code-cpu
        - code-gpu
        - Course-CV
        - Course-DL
        - Course-LLM
        - Course-PhySim

  # ============================================================================
  # Quota Management
  # ============================================================================
  quota:
    # Enable quota system (auto-disabled for auto-login/dummy modes if not set)
    enabled: null
    # CPU-only quota consumption rate
    cpuRate: 1
    # Minimum quota required to start any container
    minimumToStart: 10
    # Default quota for new users (0 = no initial allocation)
    defaultQuota: 0
    # Auto-refresh rules: each rule generates a K8s CronJob
    refreshRules: {}

# Use K3s built-in local-path storage (no NFS required)
hub:
  db:
    pvc:
      storageClassName: local-path
  image:
    name: ghcr.io/amdresearch/auplc-hub
    tag: latest
    pullPolicy: IfNotPresent

  # Additional Python config snippets (executed after core/setup.py)
  # Example:
  #   myconfig: |
  #     c.JupyterHub.some_setting = "value"
  extraConfig: {}

  extraFiles:
    announcement.txt:
    # If you want to edit the notice on login.html, change here.
      mountPath: /usr/local/share/jupyterhub/static/announcement.txt
      stringData: |
          Hello, World!

  config:
    # ---- Hub Core ----
    JupyterHub:
      # Always show Home page first, even when a server is already running.
      # Users can access their running server via the "My Server" button on Home.
      redirect_to_server: false

    Authenticator:
      allow_all: true

    # ---- GitHub OAuth ----
    GitHubOAuthenticator:
      oauth_callback_url: "https://<Your.domain>/hub/github/oauth_callback"
      app_id: ""
      installation_id: ""
      private_key_file: ""
      private_key: ""
      team_sync_ttl_seconds: 3600
      client_id: "TODO"
      client_secret: "TODO"
      allowed_organizations:
        - <YOUR-ORG-NAME>
      scope:
        - read:user
        - read:org

    # ---- KubeSpawner Prepuller Setup ----
    KubeSpawner:
      image_pull_policy: IfNotPresent

monitoring:
  enabled: false
  namespace: monitoring
  releaseLabel: monitoring

  hubMetrics:
    enabled: false
    # Keep JupyterHub's read:metrics scope requirement enabled by default.
    # Set this to true only for isolated development environments where
    # /hub/metrics is guaranteed not to be reachable through a public proxy,
    # NodePort, LoadBalancer, or Ingress.
    allowUnauthenticatedScrape: false
    serviceAnnotations:
      # Annotation-based Prometheus scraping cannot attach the JupyterHub token.
      # Prefer the ServiceMonitor below for authenticated in-cluster scraping.
      enabled: false

  serviceMonitor:
    enabled: false
    interval: 15s
    authorization:
      enabled: true
      type: Bearer
      hubServiceName: prometheus-metrics
      secret:
        create: true
        name: ""
        key: token

  grafana:
    dashboard:
      enabled: false

  prometheusRule:
    enabled: false

singleuser:
  # Security context for user pods to access GPU devices
  # supplementalGroups grants container access to host's render group (GID 993)
  # This allows non-root users to access /dev/kfd and /dev/dri devices
  extraPodConfig:
    securityContext:
      fsGroup: 100
      supplementalGroups:
        - 993  # render group for ROCm GPU access

  storage:
    dynamic:
      storageClass: local-path

# Use NodePort for direct access
proxy:
  service:
    type: NodePort
    nodePorts:
      http: 30890

# Disable ingress (use NodePort instead)
ingress:
  enabled: false

# Disable prePuller for faster deployment
# Images will be pulled on-demand when users spawn notebooks
prePuller:
  hook:
    enabled: false
  continuous:
    enabled: false
